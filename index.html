<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráfico del Índice K Planetario con Chart.js</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.34/moment-timezone-with-data.min.js"></script>
</head>
<body>
    <canvas id="planetary_k_index_chart" width="550" height="515"></canvas>

    <script>
        $(document).ready(function () {
            $.getJSON('https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json')
                .done(function (response) {
                    // El JSON ahora viene como arreglo de objetos:
                    // [{ time_tag: "...", Kp: 2.33, ... }, ...]

                    const nowUtc = moment.utc();
                    const twoDaysAgoUtc = nowUtc.clone().subtract(48, 'hours');

                    const filteredData = response.filter(item => {
                        const itemTime = moment.utc(item.time_tag);
                        return itemTime.isSameOrAfter(twoDaysAgoUtc) && itemTime.isSameOrBefore(nowUtc);
                    });

                    const labels = filteredData.map(item => {
                        const start = moment.utc(item.time_tag).tz("America/Santiago");
                        const end = start.clone().add(3, 'hours');
                        return `${start.format('MMMM-DD HH:mm')} a ${end.format('HH:mm')}`;
                    });

                    const values = filteredData.map(item => parseFloat(item.Kp));

                    const ctx = document.getElementById('planetary_k_index_chart').getContext('2d');

                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Índice Kp',
                                data: values,
                                backgroundColor: values.map(value => {
                                    if (value >= 7) return '#C80000';
                                    if (value >= 5) return '#FF0000';
                                    if (value >= 4) return '#FF9600';
                                    if (value >= 3) return '#FFC800';
                                    return '#92D050';
                                }),
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    max: 9,
                                    ticks: {
                                        stepSize: 1
                                    },
                                    title: {
                                        display: true,
                                        text: 'Índice Kp'
                                    }
                                },
                                x: {
                                    title: {
                                        display: true,
                                        text: 'Hora Local de Chile'
                                    }
                                }
                            },
                            plugins: {
                                title: {
                                    display: true,
                                    text: 'Índice K Planetario Estimado (Últimas 48 horas)'
                                },
                                legend: {
                                    display: true
                                }
                            }
                        }
                    });
                })
                .fail(function (jqxhr, textStatus, error) {
                    console.error("Error cargando JSON:", textStatus, error);
                });
        });
    </script>
</body>
</html>
